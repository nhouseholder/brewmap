name: Harvest Coffee Shops

on:
  schedule:
    # Sundays 4am PT (11:00 UTC)
    - cron: '0 11 * * 0'
  workflow_dispatch:
    # Manual trigger for testing or on-demand refresh

jobs:
  harvest:
    runs-on: ubuntu-latest
    name: Overpass → KV (30 cities)
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run harvest script
        run: node scripts/harvest-coffee-shops.mjs || echo "::warning::Harvest had failures — enrichment will still run against existing KV data"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: e246c909cd0c462975902369c8aa7512
          CLOUDFLARE_KV_NAMESPACE_ID: 22929c29cd1e40cc8399c91e0e6843e2

      - name: Enrich with Yelp reviews
        run: node scripts/enrich-with-yelp.mjs
        env:
          YELP_API_KEY: ${{ secrets.YELP_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: e246c909cd0c462975902369c8aa7512
          CLOUDFLARE_KV_NAMESPACE_ID: 22929c29cd1e40cc8399c91e0e6843e2

      - name: Enrich from shop websites
        run: node scripts/enrich-from-websites.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: e246c909cd0c462975902369c8aa7512
          CLOUDFLARE_KV_NAMESPACE_ID: 22929c29cd1e40cc8399c91e0e6843e2
